[package]
name = "k8s-device-plugin"
version = "0.1.0"
edition = "2024"


[dependencies]
prost = "0.14"
tonic = "0.14"
tonic-prost = "0.14"
tokio = { version = "1", features = [
    "rt-multi-thread",
    "net",
    "macros",
    "sync",
    "time",
] }
tokio-stream = { version = "0.1", features = ["net"] }


[build-dependencies]
tonic-prost-build = "0.14"
