[package]
name = "k8s-device-plugin"
version = "0.1.0"
edition = "2024"


[dependencies]
prost = "0.14"
tokio = {
  version = "1.52",
  features = [
    "macros",
    "net",
    "rt-multi-thread",
    "sync",
    "time",
  ]
}
tokio-stream = { version = "0.1", features = ["net"] }
tonic = "0.14"
tonic-prost = "0.14"


[build-dependencies]
tonic-prost-build = "0.14"
